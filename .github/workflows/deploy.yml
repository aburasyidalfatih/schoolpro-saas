name: Deploy to VPS (Docker)

on:
  push:
    branches: [main, develop]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Execute Deployment via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.REMOTE_HOST }}
          username: ${{ secrets.REMOTE_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          command_timeout: 30m
          script: |
            set -e
            
            # Tentukan direktori berdasarkan branch (main untuk prod, develop untuk dev)
            if [ "${{ github.ref }}" = "refs/heads/main" ]; then
              APP_DIR="/home/${{ secrets.REMOTE_USER }}/schoolpro-prod"
            else
              APP_DIR="/home/${{ secrets.REMOTE_USER }}/schoolpro-dev"
            fi

            echo "Deploying to $APP_DIR"
            
            # Pindah ke direktori aplikasi
            cd $APP_DIR

            # Ambil perubahan terbaru dari GitHub
            git fetch --all
            git reset --hard origin/${{ github.ref_name }}
            
            # Pastikan network external 'shared-proxy' ada sebelum menjalankan compose
            docker network ls | grep -q "shared-proxy" || docker network create shared-proxy
            
            # Rebuild image Docker (tanpa cache agar mendapat update terbaru)
            docker compose build --no-cache app
            
            # Restart container dengan image baru
            docker compose up -d
            
            # Bersihkan image/container lama yang tidak terpakai agar SSD tidak penuh
            docker image prune -f
