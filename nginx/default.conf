server {
    listen 80;
    server_name schoolpro.test *.schoolpro.test;

    location / {
        # Untuk dev lokal: arahkan ke host machine
        # Untuk production Docker: ganti ke http://app:3000
        proxy_pass http://host.docker.internal:3000;
        proxy_http_version 1.1;

        # Forward headers penting untuk multi-tenant
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support (untuk Next.js HMR saat dev)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Timeout
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
}
